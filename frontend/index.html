<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrediTrack</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>




<body>

<div id="typeWarningModal" class="modal hidden">
  <div class="modal-content">
    <p>Oops! Select Income or Expense to continue.</p>
    <div class="modal-buttons">
      <button id="typeOkBtn">OK</button>
    </div>
  </div>
</div>

<div id="categoryWarningModal" class="modal hidden">
  <div class="modal-content">
    <p>Please select a category to continue.</p>
    <div class="modal-buttons">
      <button id="categoryOkBtn">OK</button>
    </div>
  </div>
</div>



<div id="confirmModal" class="modal hidden">
  <div class="modal-content">
    <p>Are you sure you want to delete this transaction?</p>
    <div class="modal-buttons">
      <button id="confirmYes">Yes</button>
      <button id="confirmNo">Cancel</button>
    </div>
  </div>
</div>

<div id="editModal" class="modal hidden">
  <div class="modal-content">
    <h3>Edit Transaction</h3>

    <input type="text" id="editText" placeholder="Description">
    <input type="number" id="editAmount" placeholder="Amount in ₹">


    <select id="editCategory">
      <option value="Salary">Salary</option>
      <option value="Food">Food</option>
      <option value="Travel">Travel</option>
      <option value="Shopping">Shopping</option>
      <option value="Bills">Bills</option>
      <option value="Other">Other</option>
    </select>

    <div class="modal-buttons">
      <button id="saveEdit">Save</button>
      <button id="cancelEdit">Cancel</button>
    </div>
  </div>
</div>


<div class="container">
  <div class="top-bar">
  <button id="logoutBtn" class="logout-btn">Logout</button>
</div>


<h1>CrediTrack</h1>

<div class="balance-card">
  <p>Total Balance</p>
  <h2 id="balance">₹0</h2>

  <div class="balance-details">
    <span id="incomeTotal">Income: ₹0</span>
    <span id="expenseTotal">Expense: ₹0</span>
  </div>
</div>

<div class="analytics-card">
  <h3>Spending Breakdown</h3>
  <div id="categorySummary"></div>
  <canvas id="expenseChart"></canvas>

</div>



<h3>Add Transaction</h3>

<form id="form">
  <input id="text" placeholder="Description" required>
  <input id="amount" type="number" placeholder="Amount in ₹" required>

  <div class="type-toggle">
    <button type="button" id="addIncomeBtn" class="type-btn">Income</button>
    <button type="button" id="addExpenseBtn" class="type-btn">Expense</button>
  </div>

  <select id="category">
    <option value="">Select Category</option>
    <option value="Salary">Salary</option>
    <option value="Food">Food</option>
    <option value="Travel">Travel</option>
    <option value="Shopping">Shopping</option>
    <option value="Bills">Bills</option>
    <option value="Other">Other</option>
  </select>

  <button type="submit" class="add-btn">Add Transaction</button>


</form>

<input type="text" id="searchInput" placeholder="Search transactions..." class="search-bar">


<h3>Transactions</h3>


<select id="sortOption" class="sort-dropdown">
  <option value="newest">Newest First</option>
  <option value="oldest">Oldest First</option>
  <option value="high">Highest Amount</option>
  <option value="low">Lowest Amount</option>
</select>

<select id="categoryFilter" class="filter-dropdown">
  <option value="all">All Categories</option>
  <option value="Salary">Salary</option>
  <option value="Food">Food</option>
  <option value="Travel">Travel</option>
  <option value="Shopping">Shopping</option>
  <option value="Bills">Bills</option>
  <option value="Other">Other</option>
</select>


<div class="filter-buttons">
  <button id="filterAll" class="active-filter">All</button>
  <button id="filterIncome">Income</button>
  <button id="filterExpense">Expense</button>
</div>

<div class="transactions-container">
  <ul id="list"></ul>
</div>

</div>

<script src="script.js" defer></script>

</body>
</html>
